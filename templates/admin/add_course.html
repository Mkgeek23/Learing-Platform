{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white py-3">
                <h4 class="fw-bold mb-0">Dodaj Nowy Kurs</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tytuł kursu</label>
                        <input type="text" name="title" class="form-control" placeholder="Np. Podstawy Python" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Opis kursu</label>
                        <textarea name="description" class="form-control" rows="5" placeholder="Opisz czego uczeń się nauczy..."></textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Anuluj</a>
                        <button type="submit" class="btn btn-primary">Stwórz Kurs</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="fw-bold mb-0"><i class="fas fa-robot me-2"></i>Pomoc AI w tworzeniu kursu</h5>
            </div>
            <div class="card-body">
                <p class="text-muted small">Skopiuj poniższy prompt, aby AI pomogło Ci wymyślić tytuł i opis kursu.</p>
                <textarea id="courseGenPromptText" class="form-control mb-3" rows="5" readonly style="font-family: monospace; font-size: 0.85rem; background-color: #f8f9fa;">{{ course_gen_prompt }}</textarea>
                <button class="btn btn-outline-primary fw-bold" onclick="copyPrompt('courseGenPromptText')">
                    <i class="fas fa-copy me-2"></i>Kopiuj prompt AI
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    function copyPrompt(id) {
        const text = document.getElementById(id);
        text.select();
        navigator.clipboard.writeText(text.value);
        if (typeof showToast === 'function') {
            showToast('Prompt skopiowany!', 'success');
        } else {
            alert('Prompt skopiowany!');
        }
    }
</script>
{% endblock %}
