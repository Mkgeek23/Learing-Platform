{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
                <h4 class="fw-bold mb-0">Edytuj Kurs: {{ course.title }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tytuł kursu</label>
                        <input type="text" name="title" class="form-control" value="{{ course.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Opis kursu</label>
                        <textarea name="description" class="form-control" rows="5">{{ course.description }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('course_detail', course_id=course.id) }}" class="btn btn-outline-secondary">Anuluj</a>
                        <button type="submit" class="btn btn-primary">Zapisz zmiany</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
